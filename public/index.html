<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SmartCart v2</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        background: #f6f7f9;
        color: #1a1a1a;
      }
      header {
        padding: 24px 32px;
        background: #fff;
        border-bottom: 1px solid #e5e7eb;
      }
      header h1 { margin: 0; font-size: 20px; font-weight: 600; }
      header p { margin: 4px 0 0; color: #6b7280; font-size: 13px; }
      main { max-width: 1100px; margin: 0 auto; padding: 24px 16px 64px; }
      .composer { display: flex; gap: 8px; margin-bottom: 24px; }
      .composer input {
        flex: 1; padding: 12px 14px;
        border: 1px solid #d1d5db; border-radius: 8px;
        font-size: 15px; background: #fff;
      }
      .composer input:focus { outline: 2px solid #3b82f6; outline-offset: -1px; }
      .composer button {
        padding: 12px 20px; background: #111827; color: #fff;
        border: none; border-radius: 8px; font-size: 14px;
        font-weight: 500; cursor: pointer;
      }
      .composer button:disabled { opacity: 0.5; cursor: not-allowed; }
      .examples { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
      .examples button {
        padding: 6px 12px; background: #fff;
        border: 1px solid #d1d5db; border-radius: 999px;
        font-size: 12px; cursor: pointer; color: #374151;
      }
      .examples button:hover { background: #f3f4f6; }

      .section { margin-bottom: 24px; }
      .section-head {
        display: flex; align-items: baseline; justify-content: space-between;
        margin-bottom: 10px;
      }
      .section-head h2 {
        margin: 0; font-size: 14px; font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.05em;
        color: #111827;
      }
      .section-head .sub { font-size: 12px; color: #6b7280; }
      .badge {
        display: inline-block; padding: 2px 8px;
        font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;
        background: #f3f4f6; border-radius: 999px; color: #374151;
        margin-left: 8px; font-weight: 500;
      }
      .badge.pass { background: #d1fae5; color: #065f46; }
      .badge.partial { background: #fef3c7; color: #92400e; }
      .badge.fail { background: #fee2e2; color: #991b1b; }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 14px;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .card.premium { border-style: dashed; background: #fafaf9; }
      .card img {
        width: 100%; aspect-ratio: 1;
        object-fit: contain; background: #f9fafb;
        border-radius: 6px;
      }
      .req {
        font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;
        color: #2563eb; font-weight: 600;
      }
      .name { font-size: 13px; line-height: 1.3; font-weight: 500; min-height: 2.6em; }
      .row { display: flex; justify-content: space-between; align-items: baseline;
             font-size: 12px; color: #6b7280; }
      .price { font-weight: 600; color: #111827; font-size: 14px; }
      .meta-line { font-size: 11px; color: #9ca3af; }
      .empty {
        background: #fff; border: 1px solid #e5e7eb;
        border-radius: 8px; padding: 16px; text-align: center;
        color: #6b7280; font-size: 13px;
      }
      .err {
        background: #fef2f2; border: 1px solid #fecaca; color: #991b1b;
        padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px;
      }
      .warn {
        background: #fef3c7; border: 1px solid #fde68a; color: #92400e;
        padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; font-size: 13px;
      }
      .meta {
        background: #fff; border: 1px solid #e5e7eb;
        border-radius: 8px; padding: 14px 16px;
        font-size: 13px; margin-bottom: 16px; color: #374151;
      }
      .meta strong { color: #111827; }
      .meta details { margin-top: 8px; }
      .meta summary { cursor: pointer; color: #6b7280; font-size: 12px; }
      .meta pre {
        background: #f9fafb; border: 1px solid #e5e7eb;
        padding: 10px; border-radius: 6px; font-size: 11px;
        overflow-x: auto; margin: 8px 0 0;
      }
      .loading {
        display: inline-block; width: 14px; height: 14px;
        border: 2px solid #d1d5db; border-top-color: #111827;
        border-radius: 50%; animation: spin 0.7s linear infinite;
        vertical-align: middle;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <header>
      <h1>SmartCart v2</h1>
      <p>Mission-oriented shopping. Tell it what you're trying to do.</p>
    </header>
    <main>
      <form class="composer" id="composer">
        <input id="q" type="text" placeholder="e.g. Pav bhaji, Tea party, Movie night" autocomplete="off" required />
        <button id="go" type="submit">Plan cart</button>
      </form>
      <div class="examples">
        <button data-q="Tea party">Tea party</button>
        <button data-q="Pav bhaji">Pav bhaji</button>
        <button data-q="Movie night snacks for 5">Movie night</button>
        <button data-q="Baby food and diapers">Baby food &amp; diapers</button>
        <button data-q="Healthy breakfast for 2">Healthy breakfast</button>
        <button data-q="Maggi for hostel night">Maggi</button>
        <button data-q="Birthday party for kids">Birthday party</button>
      </div>
      <div id="status"></div>
      <div id="meta"></div>
      <div id="cart"></div>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const composer = $("composer");
      const input = $("q");
      const btn = $("go");
      const cartEl = $("cart");
      const metaEl = $("meta");
      const statusEl = $("status");

      const escape = (s) => String(s ?? "").replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

      async function run(query) {
        cartEl.innerHTML = "";
        metaEl.innerHTML = "";
        statusEl.innerHTML = '<div class="meta"><span class="loading"></span> &nbsp;Routing intent → resolving requirements → composing cart…</div>';
        btn.disabled = true;
        try {
          const res = await fetch("/api/cart", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ query }),
          });
          const data = await res.json();
          statusEl.innerHTML = "";
          if (!res.ok) {
            statusEl.innerHTML = `<div class="err">${escape(data.error || "Request failed")}</div>`;
            return;
          }
          render(data);
        } catch (e) {
          statusEl.innerHTML = `<div class="err">${escape(e.message)}</div>`;
        } finally {
          btn.disabled = false;
        }
      }

      function card(p, klass = "") {
        return `
          <div class="card ${klass}">
            <img src="${escape(p.image)}" alt="${escape(p.name)}" loading="lazy" onerror="this.style.visibility='hidden'" />
            <div class="req">${escape(p.requirement)}</div>
            <div class="name">${escape(p.name)}</div>
            <div class="row">
              <span class="price">₹${escape(p.price)}</span>
              <span>${escape(p.quantity)}</span>
            </div>
            <div class="meta-line">${escape(p.subCategory)} · ${escape(p.resolverPath)}</div>
          </div>
        `;
      }

      function render(data) {
        const t = data.trace || {};
        const cov = data.coverage || {};
        const cart = data.cart || {};

        const validationBadge =
          t.validation === "pass" ? `<span class="badge pass">pass</span>` :
          t.validation === "partial" ? `<span class="badge partial">partial</span>` :
          `<span class="badge fail">fail</span>`;

        const intentBits = [
          `<strong>Intent:</strong> ${escape(t.intentType || "?")}`,
          t.mission ? `<strong>Plan:</strong> ${escape(t.mission)}` : "",
          `<strong>Coverage:</strong> ${(t.coverage * 100).toFixed(0)}% (${cov.fulfilledEssentials}/${cov.totalEssentials})`,
        ].filter(Boolean).join(" &nbsp;·&nbsp; ");

        let warn = "";
        if (t.validation !== "pass" && (t.unfulfilled || []).length) {
          warn = `<div class="warn"><strong>Unfulfilled essentials:</strong> ${t.unfulfilled.map(escape).join(", ")} — these aren't available in the catalog or didn't match.</div>`;
        } else if (t.retried) {
          warn = `<div class="warn">Initial coverage was below threshold; retried with broader resolver and recovered.</div>`;
        }

        metaEl.innerHTML = `
          ${warn}
          <div class="meta">
            <div>${intentBits} ${validationBadge}</div>
            <details>
              <summary>Debug trace</summary>
              <pre>${escape(JSON.stringify({
                intentType: t.intentType,
                mission: t.mission,
                kbSource: t.kbSource,
                resolvedCategories: t.resolvedCategories,
                retrievedProducts: t.retrievedProducts,
                selectedProducts: t.selectedProducts,
                coverage: t.coverage,
                validation: t.validation,
                retried: t.retried,
                unfulfilled: t.unfulfilled,
                notes: t.notes,
                requirements: t.requirements,
              }, null, 2))}</pre>
            </details>
          </div>
        `;

        const sections = [
          { key: "essentials", title: "Essentials", sub: "all auto-added", items: cart.essentials || [], klass: "" },
          { key: "recommended", title: "Recommended", sub: "top 2 auto-added", items: cart.recommended || [], klass: "" },
          { key: "premium", title: "Premium suggestions", sub: "optional · not added to cart", items: cart.premiumSuggestions || [], klass: "premium" },
        ];

        cartEl.innerHTML = sections.map((s) => `
          <div class="section">
            <div class="section-head">
              <h2>${escape(s.title)}</h2>
              <span class="sub">${escape(s.sub)} · ${s.items.length} item${s.items.length === 1 ? "" : "s"}</span>
            </div>
            ${s.items.length === 0
              ? `<div class="empty">${s.key === "essentials" ? "No essentials resolved." : "—"}</div>`
              : `<div class="grid">${s.items.map((p) => card(p, s.klass)).join("")}</div>`}
          </div>
        `).join("");
      }

      composer.addEventListener("submit", (e) => {
        e.preventDefault();
        const q = input.value.trim();
        if (q) run(q);
      });

      document.querySelectorAll(".examples button").forEach((b) => {
        b.addEventListener("click", () => {
          input.value = b.dataset.q;
          run(b.dataset.q);
        });
      });
    </script>
  </body>
</html>
