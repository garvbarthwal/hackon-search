services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cart-ai-pg
    environment:
      POSTGRES_USER: cart
      POSTGRES_PASSWORD: cart
      POSTGRES_DB: cart
    ports:
      - "5433:5432"
    volumes:
      - cart-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cart -d cart"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  cart-pg-data:
